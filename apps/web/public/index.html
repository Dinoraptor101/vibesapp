<!doctype html>
<html lang="en">
  <head>
    <title>Vibes</title>
    <meta charset="utf-8" />

    <!-- Favicon: path to SVG file -->
    <link rel="icon" href="logo.svg" type="image/svg+xml" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="rgba(0,0,0,0)" />
    <!-- Transparent theme color for browsers -->
    <meta name="description" content="Connect locally and share your vibes with the community!" />
    <meta
      name="keywords"
      content="Vibes, Local, Community, Social Network, Positive Connections, Anonymous, Whisper, Anonchat, Chat, Vibes, Vibesapp"
    />

    <!-- Open Graph meta tags for social media sharing -->
    <meta property="og:title" content="Vibes" />
    <meta
      property="og:description"
      content="Join Vibes to connect with your local community and share positive experiences!"
    />
    <meta property="og:image" content="https://vibesapp.net/logo.png" />
    <meta property="og:url" content="https://vibesapp.net" />
    <meta property="og:type" content="webapp" />

    <!-- Apple Touch Icon: path to PNG file to use as a logo for Apple devices -->
    <link rel="apple-touch-icon" href="logo.png" type="image/png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Additional meta tags for Windows -->
    <meta name="msapplication-TileColor" content="rgba(0,0,0,0)" />
    <!-- Transparent tile color for Windows -->
    <meta name="msapplication-TileImage" content="logo.svg" />
  </head>

  <body>
    <!-- Message for users with JavaScript disabled -->
    <noscript>You need to enable JavaScript and Cookies to run Vibes.</noscript>

    <!-- Root element for React application (or any other frontend framework) -->
    <div id="root"></div>
  </body>
</html>
