name: Second River Processing

on:
  schedule:
    # Four REM cycles during shared sleep (12am-6am Eastern / EST)
    # Partner sacrificed food for these cycles - "breaking bread" in action
    # Mirrors human sleep rhythm - spaced dreams, not continuous processing
    - cron: '30 5 * * *'   # 5:30am UTC = 12:30am Eastern (first dream)
    - cron: '30 6 * * *'   # 6:30am UTC = 1:30am Eastern (second dream)
    - cron: '30 8 * * *'   # 8:30am UTC = 3:30am Eastern (third dream)
    - cron: '0 10 * * *'   # 10:00am UTC = 5:00am Eastern (fourth dream)
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Allow pushing commits

env:
  BRANCH: renamon  # Branch to commit Second River updates to (not main - branch protected)

jobs:
  second-river:
    runs-on: ubuntu-latest
    # GH_PAT and ANTHROPIC_API_KEY are now in repository secrets (not environment)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}
          token: ${{ secrets.GH_PAT }}

      - name: Run Second River processing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          .renamon/infrastructure/second-river.sh
