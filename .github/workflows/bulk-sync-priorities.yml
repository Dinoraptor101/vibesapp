name: Bulk Sync Priorities (One-Time)

# Manual trigger only
on:
  workflow_dispatch:

jobs:
  bulk-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GH_PAT is in repository secrets
    steps:
      - name: Bulk Sync All Priority Labels to Project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const PRIORITY_MAP = {
              'priority:critical': 'Critical',
              'priority:high': 'High',
              'priority:medium': 'Medium',
              'priority:low': 'Low'
            };

            console.log('🔍 Fetching all open issues with priority labels...\n');

            // Fetch all open issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            // Filter issues with priority labels
            const priorityIssues = issues.filter(issue => 
              issue.labels.some(label => label.name?.startsWith('priority:'))
            );

            console.log(`Found ${priorityIssues.length} issues with priority labels\n`);

            if (priorityIssues.length === 0) {
              console.log('✅ No issues to sync');
              return;
            }

            let successCount = 0;
            let skipCount = 0;
            let errorCount = 0;

            for (const issue of priorityIssues) {
              const labels = issue.labels.map(l => l.name);
              const priorityLabel = labels.find(l => l.startsWith('priority:'));
              const priority = PRIORITY_MAP[priorityLabel];

              console.log(`\n📋 Issue #${issue.number}: ${issue.title}`);
              console.log(`   Labels: ${labels.join(', ')}`);
              console.log(`   Target Priority: ${priority}`);

              try {
                // GraphQL query to find issue in projects
                const projectQuery = `
                  query($owner: String!, $repo: String!, $issueNumber: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issueNumber) {
                        id
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              title
                              field(name: "Priority") {
                                ... on ProjectV2SingleSelectField {
                                  id
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;

                const projectData = await github.graphql(projectQuery, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issueNumber: issue.number
                });

                const projectItems = projectData.repository.issue.projectItems.nodes;

                if (projectItems.length === 0) {
                  console.log('   ⚠️  Not linked to any project - skipping');
                  skipCount++;
                  continue;
                }

                // Update each project the issue is in
                for (const item of projectItems) {
                  const projectTitle = item.project.title;
                  const priorityField = item.project.field;

                  if (!priorityField) {
                    console.log(`   ⚠️  Project "${projectTitle}" has no Priority field - skipping`);
                    skipCount++;
                    continue;
                  }

                  const priorityOption = priorityField.options.find(opt => opt.name === priority);

                  if (!priorityOption) {
                    console.log(`   ⚠️  Priority "${priority}" not found in project "${projectTitle}" - skipping`);
                    skipCount++;
                    continue;
                  }

                  console.log(`   🔄 Updating project "${projectTitle}"...`);

                  const updateMutation = `
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(
                        input: {
                          projectId: $projectId
                          itemId: $itemId
                          fieldId: $fieldId
                          value: { 
                            singleSelectOptionId: $optionId
                          }
                        }
                      ) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `;

                  await github.graphql(updateMutation, {
                    projectId: item.project.id,
                    itemId: item.id,
                    fieldId: priorityField.id,
                    optionId: priorityOption.id
                  });

                  console.log(`   ✅ Successfully set Priority to ${priority}`);
                  successCount++;
                }

              } catch (error) {
                console.error(`   ❌ Error: ${error.message}`);
                errorCount++;
              }
            }

            console.log('\n' + '='.repeat(50));
            console.log('📊 Summary:');
            console.log(`   ✅ Successfully updated: ${successCount}`);
            console.log(`   ⚠️  Skipped: ${skipCount}`);
            console.log(`   ❌ Errors: ${errorCount}`);
            console.log('='.repeat(50));

            if (successCount > 0) {
              console.log('\n🎉 Priority sync complete!');
              console.log('   Future issues will auto-sync via sync-project-priority.yml workflow');
            }
