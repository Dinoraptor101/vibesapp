name: Build Status Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build project
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
          REACT_APP_CDN_URL: ${{ vars.REACT_APP_CDN_URL }}
          REACT_APP_BACKEND_URI: ${{ vars.REACT_APP_BACKEND_URI }}
          REACT_APP_S3_BUCKET: ${{ vars.REACT_APP_S3_BUCKET }}
          REACT_APP_S3_REGION: ${{ vars.REACT_APP_S3_REGION }}
          REACT_APP_PUBLIC_POSTHOG_HOST: ${{ vars.REACT_APP_PUBLIC_POSTHOG_HOST }}
          REACT_APP_DEBUG: ${{ vars.REACT_APP_DEBUG }}
          REACT_APP_ENABLE_RECAPTCHA: ${{ vars.REACT_APP_ENABLE_RECAPTCHA }}
          REACT_APP_BACKEND_API_KEY: ${{ secrets.REACT_APP_BACKEND_API_KEY }}
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
          REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
        run: npm run build
