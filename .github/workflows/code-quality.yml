name: Code Quality Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          # Hash all lock files (root + workspaces) to detect any dependency changes
          # This ensures cache invalidates when any package.json/package-lock.json in monorepo changes
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'apps/*/package-lock.json', 'libs/*/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci --loglevel=verbose

      - name: Lint Web-V2 (ESLint + Biome)
        working-directory: apps/web-v2
        run: npm run lint

      - name: Lint API (ESLint)
        working-directory: apps/api
        run: npm run lint

      - name: Check TypeScript types (Web-V2)
        working-directory: apps/web-v2
        run: npx tsc --noEmit

      - name: Format check (Web-V2)
        working-directory: apps/web-v2
        run: npm run format:check
