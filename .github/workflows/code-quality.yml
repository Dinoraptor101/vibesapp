name: Code Quality Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint Web-V2 (ESLint + Biome)
        working-directory: apps/web-v2
        run: npm run lint

      - name: Lint API (ESLint)
        working-directory: apps/api
        run: npm run lint

      - name: Check TypeScript types (Web-V2)
        working-directory: apps/web-v2
        run: npx tsc --noEmit

      - name: Format check (Web-V2)
        working-directory: apps/web-v2
        run: npm run format:check
