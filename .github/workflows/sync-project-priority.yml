name: Sync Issue Priority to Project Board

on:
  issues:
    types: [opened, labeled, unlabeled, reopened]

jobs:
  sync-priority:
    runs-on: ubuntu-latest
    environment: github-pages
    timeout-minutes: 5
    steps:
      - name: Sync Priority Field
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name);
            
            console.log(`Processing issue #${issue.number}: ${issue.title}`);
            console.log(`Current labels: ${labels.join(', ')}`);
            
            // Determine priority from labels
            let priority = null;
            if (labels.includes('priority:critical')) {
              priority = 'Critical';
            } else if (labels.includes('priority:high')) {
              priority = 'High';
            } else if (labels.includes('priority:medium')) {
              priority = 'Medium';
            } else if (labels.includes('priority:low')) {
              priority = 'Low';
            }
            
            if (!priority) {
              console.log('No priority label found, skipping...');
              return;
            }
            
            console.log(`Target priority: ${priority}`);
            
            // GraphQL query to find the project and issue
            const findProjectQuery = `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    id
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                          title
                          field(name: "Priority") {
                            ... on ProjectV2SingleSelectField {
                              id
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            try {
              const projectData = await github.graphql(findProjectQuery, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issueNumber: issue.number
              });
              
              const projectItems = projectData.repository.issue.projectItems.nodes;
              
              if (projectItems.length === 0) {
                console.log('Issue not linked to any project, skipping...');
                return;
              }
              
              // Update priority for each project the issue is in
              for (const item of projectItems) {
                const projectTitle = item.project.title;
                const priorityField = item.project.field;
                
                if (!priorityField) {
                  console.log(`Project "${projectTitle}" has no Priority field, skipping...`);
                  continue;
                }
                
                // Find matching priority option
                const priorityOption = priorityField.options.find(
                  opt => opt.name === priority
                );
                
                if (!priorityOption) {
                  console.log(`Priority "${priority}" not found in project "${projectTitle}", skipping...`);
                  continue;
                }
                
                console.log(`Updating project "${projectTitle}" item to Priority: ${priority}`);
                
                // Update the project item
                const updateMutation = `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { 
                          singleSelectOptionId: $optionId
                        }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `;
                
                await github.graphql(updateMutation, {
                  projectId: item.project.id,
                  itemId: item.id,
                  fieldId: priorityField.id,
                  optionId: priorityOption.id
                });
                
                console.log(`✓ Successfully updated Priority to ${priority}`);
              }
            } catch (error) {
              console.error('Error syncing priority:', error);
              throw error;
            }
